<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tickets & Registration</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <div class="logo">LesothoFest</div>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="programme.html">Programme</a></li>
    <li><a href="tickets.html">Tickets</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
  <button>Join</button>
</nav>

<div class="hero">
  <img src="images/festival-banner.jpg" alt="Tickets">
  <div class="hero-text">
    <h1>Book Your Tickets</h1>
    <p>Secure your spot at the festival now!</p>
  </div>
</div>

<section class="cards">
  <div class="card">
    <h3>🎟️ Ticket Pricing</h3>
    <ul>
      <li>Adults: M 450</li>
      <li>Students: M 250</li>
      <li>Children (under 12): Free</li>
    </ul>
  </div>
  <div class="card">
    <h3>Registration Form</h3>
    <form>
      <input type="text" placeholder="Full Name" required>
      <input type="email" placeholder="Email Address" required>
      <input type="tel" placeholder="Phone Number" required>
      <select>
        <option value="">Ticket Type</option>
        <option value="adult">Adult</option>
        <option value="student">Student</option>
        <option value="child">Child</option>
      </select>
      <button type="submit">Register</button>
    </form>
  </div>
</section>

<footer>
  <div class="footer-content">
    <p>&copy; 2026 Lesotho Tourism Event</p>
    <div class="social-links">
      <a href="https://www.facebook.com/lesothofest" target="_blank" rel="noopener" title="Facebook"><i class="fab fa-facebook-f"></i></a>
      <a href="https://www.instagram.com/lesothofest" target="_blank" rel="noopener" title="Instagram"><i class="fab fa-instagram"></i></a>
      <a href="https://www.youtube.com/@lesothofest" target="_blank" rel="noopener" title="YouTube"><i class="fab fa-youtube"></i></a>
    </div>
  </div>
</footer>

</body>
</html>
